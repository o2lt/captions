<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語 Plain Subtitles</title>
</head>
<body style="margin: 0; padding: 30px; background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; height: 100vh; box-sizing: border-box;">

    <div id="control-panel" style="align-self: flex-start; z-index: 10; background: rgba(20, 20, 20, 0.9); padding: 12px 18px; border-radius: 8px; border: 1px solid #333333;">
        <a href="index.html" style="color: #34c759; text-decoration: none; font-size: 14px; font-weight: bold; margin-right: 20px;">← Portal</a>
        <span style="font-size: 13px; color: #aaaaaa; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Track Mode: 日本語 Plain Text Only</span>
    </div>

    <div id="caption-box" style="font-size: 8vh; font-weight: 700; line-height: 1.6; max-height: 72vh; overflow-y: auto; word-wrap: break-word; margin-top: 20px; scroll-behavior: smooth;">
        <span class="final" id="final-text" style="color: #ffffff;">画面をタップすると日本語音声認識を開始します...</span>
        <span class="interim" id="interim-text" style="color: #777777; font-style: italic;"></span>
    </div>

    <script>
        const captionBox = document.getElementById('caption-box');
        const finalTextObj = document.getElementById('final-text');
        const interimTextObj = document.getElementById('interim-text');

        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        
        function formatParticles(text) {
            return text
                .replace(/は/g, '<span style="color: #c71f23;"><strong>は</strong></span>')
                .replace(/が/g, '<span style="color: #c71f23;"><strong>が</strong></span>')
                .replace(/を/g, '<span style="color: #c71f23;"><strong>を</strong></span>')
                .replace(/に/g, '<span style="color: #c71f23;"><strong>に</strong></span>')
                .replace(/で/g, '<span style="color: #c71f23;"><strong>で</strong></span>');
        }

        if (!SpeechRecognition) {
            finalTextObj.innerText = "Error: Browser Speech API missing.";
        } else {
            let recognition = new SpeechRecognition();
            let isRunning = false;

            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = "ja-JP"; 

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                if (finalTranscript) { finalTextObj.innerHTML += formatParticles(finalTranscript) + ' '; }
                interimTextObj.innerHTML = formatParticles(interimTranscript);
                captionBox.scrollTop = captionBox.scrollHeight;
            };

            recognition.onend = () => { if (isRunning) { try { recognition.start(); } catch (e) {} } };

            document.body.addEventListener('click', (e) => {
                if (e.target.tagName === 'A') return;
                if (!isRunning) {
                    finalTextObj.innerHTML = "";
                    interimTextObj.innerHTML = "";
                    isRunning = true;
                    try { recognition.start(); } catch (e) {}
                }
            });
        }
    </script>
</body>
</html>
