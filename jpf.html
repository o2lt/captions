<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語 Live Furigana Deck</title>
</head>
<body style="margin: 0; padding: 30px; background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; height: 100vh; box-sizing: border-box;">

    <!-- Control Header -->
    <div id="control-panel" style="align-self: flex-start; z-index: 10; background: rgba(20, 20, 20, 0.9); padding: 12px 18px; border-radius: 8px; border: 1px solid #333333; display: flex; align-items: center; gap: 20px;">
        <a href="index.html" style="color: #ff9500; text-decoration: none; font-size: 16px; font-weight: bold; background: #1c1c1e; padding: 6px 12px; border-radius: 4px; border: 1px solid #444;">← Return to Portal</a>
        <div>
            <span style="font-size: 13px; color: #aaaaaa; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-right: 15px;">Track Mode: 日本語 + 振仮名</span>
            <span id="engine-status" style="font-size: 13px; color: #ff9500; font-weight: bold;">Loading parsing dictionary...</span>
        </div>
    </div>

    <div id="caption-box" style="font-size: 18pt; font-weight: 700; line-height: 2.8; max-height: 75vh; overflow-y: auto; word-wrap: break-word; margin-top: 20px; ruby-position: over; scroll-behavior: smooth;">
        <span class="final" id="final-text" style="color: #ffffff;">辞書データの読み込み完了をお待ちください...</span>
        <span class="interim" id="interim-text" style="color: #777777; font-style: italic;"></span>
    </div>

    <!-- Using the standard official stable production build of Kuromoji -->
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <script>
        const captionBox = document.getElementById('caption-box');
        const finalTextObj = document.getElementById('final-text');
        const interimTextObj = document.getElementById('interim-text');
        const engineStatus = document.getElementById('engine-status');

        let tokenizer = null;
        let recognition = null;
        let isRunning = false;
        let micPermissionGranted = false;
        
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;

        // Points directly to the relative directory containing your 12 uploaded .dat.gz files
        kuromoji.builder({ dicPath: "kuromoji-dict/" }).build((err, _tokenizer) => {
            if (err) {
                engineStatus.innerText = "Initialization Failed";
                engineStatus.style.color = "#ff3b30";
                console.error("Kuromoji initialization error:", err);
                return;
            }
            
            tokenizer = _tokenizer;
            engineStatus.innerText = "Parser Connected";
            engineStatus.style.color = "#34c759";
            finalTextObj.innerText = "画面をタップしてマイクを許可し、音声認識を開始してください...";
        });

        function toHiragana(katakana) {
            return katakana.replace(/[\u30a1-\u30f6]/g, match => {
                return String.fromCharCode(match.charCodeAt(0) - 0x60);
            });
        }

        function injectFuriganaAndHighlights(rawText) {
            if (!tokenizer) return rawText;
            const tokens = tokenizer.tokenize(rawText);
            let processedHtml = "";

            tokens.forEach(token => {
                let surface = token.surface_form;
                let reading = token.reading;

                // Particle highlighting matching your custom color requirements for Canvas deployment
                if (surface === "は" || surface === "が" || surface === "を" || surface === "に" || surface === "で") {
                    processedHtml += `<span style="color: #c71f23;"><strong>${surface}</strong></span>`;
                    return;
                }

                if (reading && reading !== "*" && /[一-龠々]/.test(surface)) {
                    let hiraganaReading = toHiragana(reading);
                    processedHtml += `<ruby style="font-size: 18pt;">${surface}<rt style="font-size: 14pt; color: #888; font-weight: normal; letter-spacing: 0px;">${hiraganaReading}</rt></ruby>`;
                } else {
                    processedHtml += surface;
                }
            });
            return processedHtml;
        }

        function setupSpeechEngine() {
            if (!SpeechRecognition) {
                engineStatus.innerText = "Speech API Unsupported";
                engineStatus.style.color = "#ff3b30";
                return false;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = "ja-JP"; 

            recognition.onstart = () => {
                micPermissionGranted = true;
                engineStatus.innerText = "Listening...";
                engineStatus.style.color = "#ff9500";
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                if (finalTranscript) { 
                    finalTextObj.innerHTML += injectFuriganaAndHighlights(finalTranscript) + ' '; 
                }
                interimTextObj.innerHTML = injectFuriganaAndHighlights(interimTranscript);
                captionBox.scrollTop = captionBox.scrollHeight;
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error:", event.error);
                if (event.error === 'not-allowed') {
                    engineStatus.innerText = "Microphone Denied";
                    engineStatus.style.color = "#ff3b30";
                    isRunning = false;
                }
            };

            recognition.onend = () => { 
                if (isRunning) { 
                    try { recognition.start(); } catch (e) { console.error(e); } 
                } 
            };

            return true;
        }

        // Clean user-tap listener to prevent cross-origin collision issues and handle mic toggling safely
        document.body.addEventListener('click', async (e) => {
            if (e.target.tagName === 'A' || !tokenizer) return;

            if (!recognition) {
                const ready = setupSpeechEngine();
                if (!ready) return;
            }
            
            if (!isRunning) {
                finalTextObj.innerHTML = "";
                interimTextObj.innerHTML = "";
                isRunning = true;
                
                if (!micPermissionGranted) {
                    engineStatus.innerText = "Requesting Mic...";
                }
                
                try { 
                    recognition.start(); 
                } catch (e) { 
                    console.error(e); 
                }
            } else {
                isRunning = false;
                engineStatus.innerText = "Parser Connected";
                engineStatus.style.color = "#34c759";
                try { 
                    recognition.stop(); 
                } catch (e) { 
                    console.error(e); 
                }
            }
        });
    </script>
</body>
</html>
